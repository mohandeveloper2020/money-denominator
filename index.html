<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Denominator</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h1>&#8377; Money Denominator</h1>
        <p class="subtitle">Enter the count of each denomination</p>

        

        <div class="columns">
            <!-- Column 1: 500, 200, 100 -->
            <div class="column">
                <div class="row" data-denom="500">
                    <span class="denomination-label">500</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 500)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result500">0</span>
                </div>
                <div class="row" data-denom="200">
                    <span class="denomination-label">200</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 200)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result200">0</span>
                </div>
                <div class="row" data-denom="100">
                    <span class="denomination-label">100</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 100)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result100">0</span>
                </div>
            </div>

            <!-- Column 2: 50, 20, 10 -->
            <div class="column">
                <div class="row" data-denom="50">
                    <span class="denomination-label">50</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 50)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result50">0</span>
                </div>
                <div class="row" data-denom="20">
                    <span class="denomination-label">20</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 20)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result20">0</span>
                </div>
                <div class="row" data-denom="10">
                    <span class="denomination-label">10</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 10)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result10">0</span>
                </div>
            </div>

            <!-- Column 3: 5, 2, 1 -->
            <div class="column">
                <div class="row">
                    <span class="denomination-label">5</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 5)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result5">0</span>
                </div>
                <div class="row">
                    <span class="denomination-label">2</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 2)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result2">0</span>
                </div>
                <div class="row">
                    <span class="denomination-label">1</span>
                    <span class="multiply">&#215;</span>
                    <input type="number" placeholder="0" min="0" oninput="calculateAmount(this.value, 1)">
                    <span class="equals">=</span>
                    <span class="result-value" id="result1">0</span>
                </div>
            </div>
        </div>

        <div class="total-row">
            <span class="total-label">Total Amount</span>
            <span class="total-value" id="total">&#8377; 0</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
