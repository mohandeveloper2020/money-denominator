<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Denominator</title>
</head>
<body>
    
    <h1>Money Denominator</h1>
    <div>
        500 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 500)"> = <span id="result500">0</span>
    </div>
    <div>
        200 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 200)"> = <span id="result200">0</span>
    </div>
    <div>
        100 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 100)"> = <span id="result100">0</span>
    </div>
    <div>
        50 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 50)"> = <span id="result50">0</span>
    </div>
    <div>
        20 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 20)"> = <span id="result20">0</span>
    </div>
    <div>
        10 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 10)"> = <span id="result10">0</span>
    </div>
    <div>
        5 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 5)"> = <span id="result5">0</span>
    </div>
    <div>
        2 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 2)"> = <span id="result2">0</span>
    </div>
    <div>
        1 * <input type="number" placeholder="" oninput="calculateAmount(this.value, 1)"> = <span id="result1">0</span>
    </div>

    <div>
        Total = <span id="total">0</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
